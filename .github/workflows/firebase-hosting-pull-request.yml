name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: asthmaapp
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.6" # or your required version
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Validate AIRNOW_API_KEY secret
        run: |
          if [ -z "$AIRNOW_API_KEY" ]; then
            echo "AIRNOW_API_KEY secret is not set"
            exit 1
          fi
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
      - run: flutter build web --dart-define=AIRNOW_API_KEY=$AIRNOW_API_KEY
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASTHMA_ATTACKERS_4DED3 }}
          projectId: asthma-attackers-4ded3
